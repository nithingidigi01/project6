<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidhwaan — Intelligent LinkedIn Automation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#4f46e5;
    --primary-soft:#6366f1;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#0f172a;
    --muted:#64748b;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:"Inter",sans-serif;
    color:var(--text);
    background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 40%,#f6f9ff 100%);
    overflow-x:hidden;
}

/* Floating ambient lights */
body::before,
body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.35;
    z-index:-1;
}

body::before{
    background:#a5b4fc;
    top:-200px;
    left:-150px;
}

body::after{
    background:#c7d2fe;
    bottom:-200px;
    right:-150px;
}

/* Header */
.header{
    text-align:center;
    padding:70px 20px 30px;
}

.logo{
    font-size:32px;
    font-weight:800;
    letter-spacing:-0.5px;
}

.tagline{
    margin-top:10px;
    font-size:15px;
    color:var(--muted);
}

/* Card */
.wrapper{
    display:flex;
    justify-content:center;
    padding:30px 20px 80px;
}

.card{
    width:100%;
    max-width:720px;
    padding:50px;
    border-radius:28px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    box-shadow:
        0 40px 80px rgba(79,70,229,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.7);
    transition:all 0.4s cubic-bezier(.4,0,.2,1);
}

.card:hover{
    transform:translateY(-4px);
}

/* Form */
.section-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:22px;
    margin-bottom:8px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
}

select,input{
    width:100%;
    padding:15px;
    border-radius:16px;
    border:none;
    background:rgba(255,255,255,0.8);
    font-size:14px;
    transition:all 0.3s ease;
    box-shadow:0 8px 18px rgba(0,0,0,0.04);
}

select:focus,input:focus{
    outline:none;
    box-shadow:
        0 0 0 4px rgba(99,102,241,0.15),
        0 8px 20px rgba(99,102,241,0.2);
}

/* Buttons */
button{
    width:100%;
    padding:16px;
    margin-top:28px;
    border-radius:18px;
    border:none;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:all 0.3s ease;
}

.primary-btn{
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    color:white;
    box-shadow:0 12px 30px rgba(79,70,229,0.35);
}

.primary-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 40px rgba(79,70,229,0.45);
}

.secondary-btn{
    background:rgba(255,255,255,0.7);
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.secondary-btn:hover{
    background:white;
}

/* Status */
.status-box{
    margin-top:30px;
    padding:20px;
    border-radius:20px;
    font-size:14px;
    min-height:60px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px);
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    white-space:pre-line;
}

.status-success{
    color:var(--success);
}

.status-error{
    color:var(--danger);
}

/* Loader */
.loader{
    display:inline-block;
    width:18px;
    height:18px;
    border-radius:50%;
    border:3px solid rgba(99,102,241,0.2);
    border-top:3px solid var(--primary);
    animation:spin 0.8s linear infinite;
    margin-right:8px;
    vertical-align:middle;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.footer{
    text-align:center;
    padding:50px 20px;
    font-size:13px;
    color:var(--muted);
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">Vidhwaan</div>
    <div class="tagline">Liquid-Intelligent LinkedIn Automation Platform</div>
</div>

<div class="wrapper">
<div class="card">

<div class="section-title">Create & Publish</div>

<label>Purpose</label>
<select id="purpose"></select>

<label>Category</label>
<select id="category"></select>

<label>Topic</label>
<select id="topic"></select>

<label>Tone Category</label>
<select id="toneCategory"></select>

<label>Tone</label>
<select id="tone"></select>

<label>Format</label>
<select id="format"></select>

<label>Unique ID</label>
<input id="uniqueId" placeholder="Enter your Unique ID">

<button id="postBtn" class="primary-btn" onclick="post()">Generate & Publish</button>
<button class="secondary-btn" onclick="getUniqueId()">Generate Secure Unique ID</button>

<div id="status" class="status-box"></div>

</div>
</div>

<div class="footer">
© 2026 Vidhwaan Technologies
</div>

<script>

/* FULL WORKING DROPDOWN SYSTEM RESTORED */

let currentJobId=null;
let pollingInterval=null;
let pipelineRunning=false;

function setStatus(msg,type=null,loading=false){
    const box=document.getElementById("status");
    box.className="status-box";
    if(type==="success") box.classList.add("status-success");
    if(type==="error") box.classList.add("status-error");
    if(loading){
        box.innerHTML='<span class="loader"></span>'+msg;
    }else{
        box.innerText=msg;
    }
}

function fillDropdown(id,items){
    const select=document.getElementById(id);
    select.innerHTML="";
    items.forEach(i=>{
        const o=document.createElement("option");
        o.value=i;
        o.text=i;
        select.appendChild(o);
    });
}

async function fetchJSON(url){
    const r=await fetch(url);
    if(!r.ok) return [];
    return await r.json();
}

async function loadPurposes(){
    fillDropdown("purpose",await fetchJSON("/api/purposes"));
    await loadCategories();
}

async function loadCategories(){
    fillDropdown("category",await fetchJSON(`/api/categories/${encodeURIComponent(purpose.value)}`));
    await loadTopics();
}

async function loadTopics(){
    fillDropdown("topic",await fetchJSON(`/api/topics/${encodeURIComponent(purpose.value)}/${encodeURIComponent(category.value)}`));
    await loadToneCategories();
}

async function loadToneCategories(){
    fillDropdown("toneCategory",await fetchJSON("/api/tone-categories"));
    await loadTones();
}

async function loadTones(){
    fillDropdown("tone",await fetchJSON(`/api/tones/${encodeURIComponent(toneCategory.value)}`));
    await loadFormats();
}

async function loadFormats(){
    fillDropdown("format",await fetchJSON("/api/formats"));
}

async function getUniqueId(){
    setStatus("Launching LinkedIn login...",null,true);
    const r=await fetch("/get-unique-id",{method:"POST"});
    const d=await r.json();
    if(d.status==="success"){
        uniqueId.value=d.unique_id;
        setStatus("Login successful.\nYour Unique ID: "+d.unique_id,"success");
    }else{
        setStatus("Login failed.","error");
    }
}

async function post(){

    if(pipelineRunning) return;
    pipelineRunning=true;
    postBtn.disabled=true;

    setStatus("Starting process...",null,true);

    const payload={
        purpose:purpose.value,
        category:category.value,
        topic:topic.value,
        tone:tone.value,
        format_type:format.value,
        unique_id:uniqueId.value||null
    };

    const r=await fetch("/generate-post",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    const data=await r.json();
    if(data.error){
        setStatus("Enter valid Unique ID.","error");
        postBtn.disabled=false;
        pipelineRunning=false;
        return;
    }

    currentJobId=data.job_id;

    pollingInterval=setInterval(async()=>{
        const s=await fetch(`/job-status/${currentJobId}`);
        const j=await s.json();
        if(j.status==="posted"){
            setStatus("Post published successfully.","success");
            clearInterval(pollingInterval);
            postBtn.disabled=false;
            pipelineRunning=false;
        }
        if(j.status==="invalid_uid"){
            setStatus("Invalid Unique ID.","error");
            clearInterval(pollingInterval);
            postBtn.disabled=false;
            pipelineRunning=false;
        }
        if(j.status==="uid_expired"){
            setStatus("Session expired.","error");
            clearInterval(pollingInterval);
            postBtn.disabled=false;
            pipelineRunning=false;
        }
    },2000);
}

document.addEventListener("DOMContentLoaded",()=>{
    purpose.addEventListener("change",loadCategories);
    category.addEventListener("change",loadTopics);
    toneCategory.addEventListener("change",loadTones);
    loadPurposes();
});

</script>

</body>
</html>
