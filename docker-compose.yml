version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: linkedin_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - linkedin_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - ollama
    networks:
      - linkedin_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - ollama
    networks:
      - linkedin_net

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - linkedin_net

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - linkedin_net

volumes:
  redis_data:
  ollama_data:

networks:
  linkedin_net:
    driver: bridge