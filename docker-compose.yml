version: "3.9"

services:

  # -------------------------------------------------
  # REDIS (Queue + Job State)
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - linkedin_net


  # -------------------------------------------------
  # FASTAPI (Stateless API Layer)
  # -------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
    networks:
      - linkedin_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M


  # -------------------------------------------------
  # WORKER (RQ + Playwright + Ollama + VNC)
  # -------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
    networks:
      - linkedin_net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G


  # -------------------------------------------------
  # NGINX (Reverse Proxy)
  # -------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - linkedin_net


# -------------------------------------------------
# NETWORK
# -------------------------------------------------
networks:
  linkedin_net:
    driver: bridge


# -------------------------------------------------
# VOLUMES
# -------------------------------------------------
volumes:
  redis_data: